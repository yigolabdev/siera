    <!-- 카카오톡/인앱 브라우저 → 외부 브라우저 강제 이동 (React 로딩 전 즉시 실행) -->
    <script>
      (function() {
        var ua = navigator.userAgent || navigator.vendor || window.opera;
        var uaLower = ua.toLowerCase();

        // 카카오톡 인앱 브라우저가 아니면 무시
        if (uaLower.indexOf('kakaotalk') === -1) return;

        var url = window.location.href;

        // DOMContentLoaded 이후 또는 즉시 실행
        function run() {
          if (/android/i.test(ua)) {
            // ===== Android: intent 스킴 (가장 확실한 방법) =====
            // Chrome 패키지 지정 + fallback URL로 이중 보장
            location.replace(
              'intent://' + url.replace(/https?:\/\//i, '') +
              '#Intent;scheme=https;package=com.android.chrome;S.browser_fallback_url=' +
              encodeURIComponent(url) + ';end'
            );
          } else if (/iphone|ipad|ipod/i.test(ua)) {
            // ===== iOS: 카카오톡 공식 외부 브라우저 스킴 =====
            location.replace(
              'kakaotalk://web/openExternal?url=' + encodeURIComponent(url)
            );
          }
        }

        // readyState 체크 후 실행 (DOMContentLoaded 보장)
        if (document.readyState !== 'loading') {
          run();
        } else {
          document.addEventListener('DOMContentLoaded', run);
        }
      })();
    </script>
